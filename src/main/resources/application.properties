spring.application.name=gestion-deportiva

# Configuracion de Base de Datos H2 (En Memoria - No requiere instalacion)
spring.datasource.url=jdbc:h2:mem:gestion_deportiva
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Habilita la consola web de H2 para ver las tablas en el navegador
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Configuración de Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true